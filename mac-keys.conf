# MANAGED-BY: mac-keys-script v1 — installed copy; edit mac-keys.conf in the repo and re-run install-mac-keys.sh
#
# This is the SHARED body of the keyd config template. The layout-specific
# [main] block (which key becomes the Cmd layer) is NOT here — the installer
# composes the final config by inserting layouts/<layout>.conf ([main]) ahead
# of the [cmd:M] layer below. Pick the layout with:
#     ./install-mac-keys.sh --layout thinkpad   (default)
#     ./install-mac-keys.sh --layout standard
#
# To add/remove a key combination:
#   1. Edit the [cmd:M] layer below (e.g. `b = C-b` makes Cmd+B send Ctrl+B).
#   2. Re-run ./install-mac-keys.sh — it validates, installs, and reloads.
# Never bind control/leftcontrol/rightcontrol as a SOURCE (left of `=`);
# the installer's guard will refuse the config if you do.
[ids]
*

# <<< MAC-KEYS LAYOUT INSERT >>>
# The installer replaces the line above with the [main] block from
# layouts/<layout>.conf. If you install this file by hand, paste the
# desired layout's [main] block here.

# The "cmd" layer behaves like a modifier; bare taps still send Meta
# so things like the GNOME overview on Super remain usable.
[cmd:M]
# Copy / paste / cut. These are global Ctrl chords — in terminals Cmd+C
# sends Ctrl+C (SIGINT); use the terminal's native Ctrl+Shift+C/V there.
c = C-c
v = C-v
x = C-x
# Select all
a = C-a
# Reload (browsers); in shells this lands on Ctrl+R history search
r = C-r
# Browser set: new tab, new window, focus address bar.
# Shift composes: Cmd+Shift+T reopens a tab, Cmd+Shift+N = private window.
t = C-t
n = C-n
l = C-l
# Editor set: save, find, print, open.
# (In a shell, Alt+S sends C-s = freeze output; C-q unfreezes.)
s = C-s
f = C-f
p = C-p
o = C-o
# Quit window (Alt+F4 equivalent of macOS Cmd+Q)
q = A-f4
# Undo
z = C-z
# Close tab: sends Ctrl+W (Firefox/Chrome close-tab). Note: applies in
# every app (no per-app scoping without the keyd GNOME extension), so
# Cmd+W in e.g. a shell sends Ctrl+W (delete-word) there too.
w = C-w
# App switching
tab = M-tab

# ──────────────────────────────────────────────────────────────────────
# OPTIONAL muscle-memory extras — DISABLED by default.
# Uncomment individual lines below (inside this same [cmd:M] layer) to
# enable them. None of these touch the physical Ctrl key.
#
# Cmd+Space → launcher: needs NO mapping here. The cmd layer is :M, so
# Cmd+Space already passes through as Super+Space; run
# common/setup-launcher-key.sh to bind that to the GNOME overview (and
# disable the bare-Super overview trigger). Do NOT map `space` in this
# layer — an explicit mapping would break that passthrough.
#
# left = home             # Cmd+Left  → start of line
# right = end             # Cmd+Right → end of line
#
# Word-jump on the Option position requires a custom layer. On the
# thinkpad layout the Option position is the Win key (which acts as Alt
# after the swap); replace `leftmeta = layer(alt)` in layouts/thinkpad.conf
# with `leftmeta = layer(opt)` and add the block below. On the standard
# layout, leftalt is already the Option key, so add `leftalt = layer(opt)`
# to layouts/standard.conf instead. Then add:
#
#   [opt:A]
#   left = C-left           # Opt+Left  → previous word
#   right = C-right         # Opt+Right → next word
# ──────────────────────────────────────────────────────────────────────
