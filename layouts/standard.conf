[main]
# Standard US desktop bottom row (Ctrl Alt Super Space Alt Fn): the key
# directly left of the spacebar is Super (Win/Meta) — that is where macOS
# Cmd sits, so Super becomes the cmd layer. No swap is needed here: leftalt
# already occupies the Option position to its left, exactly like a Mac, so
# it is left untouched as a normal Alt/Option key.
# layer(...) rather than bare keycode assignments — verified against
# keyd 2.6.0, which warns on direct modifier-keycode binds.
leftmeta = layer(cmd)
